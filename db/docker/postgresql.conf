# ==============================================================
# Upraizo PostgreSQL Configuration (Production - 8GB RAM)
# ==============================================================
# Tuned for: GCP N2-standard-2 (8 GB RAM, 2 CPU cores, SSD)
# ==============================================================

# ── Connection ────────────────────────────────────────────────
listen_addresses = '*'
port = 5432
max_connections = 200            # Increased for more app instances
superuser_reserved_connections = 3

# ── Memory ────────────────────────────────────────────────────
# shared_buffers: 25% of RAM (8 GB → 2 GB)
shared_buffers = 2GB
# effective_cache_size: 75% of RAM
effective_cache_size = 6GB
# work_mem: per-sort/hash operation memory
work_mem = 16MB
# maintenance_work_mem: VACUUM, CREATE INDEX, ALTER TABLE
maintenance_work_mem = 512MB

# ── WAL & Checkpoints ────────────────────────────────────────
wal_level = replica
max_wal_senders = 5
wal_keep_size = 512MB

# Archive mode for WAL-G
archive_mode = on
archive_command = 'test ! -f /var/lib/walg/%f && cp %p /var/lib/walg/%f'
archive_timeout = 60

# Checkpoint tuning (More aggressive for faster GCP SSDs)
checkpoint_completion_target = 0.9
checkpoint_timeout = 15min
max_wal_size = 2GB
min_wal_size = 512MB

# ── Query Planner ─────────────────────────────────────────────
random_page_cost = 1.1           # GCP Persistent Disk SSD
effective_io_concurrency = 200   # SSD
default_statistics_target = 100

# ── Parallel Queries ──────────────────────────────────────────
max_worker_processes = 4
max_parallel_workers_per_gather = 2
max_parallel_workers = 4
max_parallel_maintenance_workers = 2

# ── Logging ───────────────────────────────────────────────────
log_destination = 'stderr'
logging_collector = on
log_directory = 'pg_log'
log_filename = 'postgresql-%Y-%m-%d_%H%M%S.log'
log_rotation_age = 1d
log_rotation_size = 100MB
log_min_duration_statement = 1000
log_checkpoints = on
log_connections = on
log_disconnections = on
log_lock_waits = on

# ── Autovacuum ────────────────────────────────────────────────
autovacuum = on
autovacuum_max_workers = 3
autovacuum_naptime = 30s

# ── Security ──────────────────────────────────────────────────
password_encryption = scram-sha-256
row_security = on

# ── Locale ────────────────────────────────────────────────────
timezone = 'Asia/Kolkata'
lc_messages = 'en_US.UTF-8'
