# ==============================================================
# Upraizo pg_hba.conf — Client Authentication
# ==============================================================
# TYPE  DATABASE  USER           ADDRESS         METHOD
# ==============================================================

# ── Local (inside container) ──────────────────────────────────
# Unix socket connections — trusted (container internal only)
local   all       all                            trust

# ── Loopback ──────────────────────────────────────────────────
# localhost connections — trusted (health checks)
host    all       all            127.0.0.1/32    trust
host    all       all            ::1/128         trust

# ── Docker network (PgBouncer, WAL-G, migrate) ───────────────
# All container-to-container connections use SCRAM-SHA-256
host    all       all            172.16.0.0/12   scram-sha-256
host    all       all            192.168.0.0/16  scram-sha-256
host    all       all            10.0.0.0/8      scram-sha-256

# ── Reject everything else ───────────────────────────────────
host    all       all            0.0.0.0/0       reject
host    all       all            ::/0            reject