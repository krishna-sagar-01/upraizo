# ==============================================================
# Upraizo Server — Production Docker Compose
# ==============================================================
# Services: Nginx, Go Server, RabbitMQ, Redis
# VM: GCP N2-standard-2 (2 vCPU, 8GB RAM, SSD)
# ==============================================================
# PREREQUISITE: docker network create upraizo_shared
# ==============================================================

services:
  # ── Nginx (Reverse Proxy + SSL) ─────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: upraizo-nginx
    restart: always
    depends_on:
      server:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    deploy:
      resources:
        limits:
          cpus: "0.10"
          memory: 128M
        reservations:
          cpus: "0.05"
          memory: 64M
    networks:
      - backend_web
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80/ || exit 0"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Go Server ───────────────────────────────────────────────
  server:
    build:
      context: .
      dockerfile: Dockerfile
    image: upraizo-server:latest
    container_name: upraizo-server
    restart: always
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env.prod
    volumes:
      - server_tmp:/app/storage/tmp
    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: 2G
        reservations:
          cpus: "0.40"
          memory: 512M
    networks:
      - backend_web
      - backend_internal
      - upraizo_shared
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ── RabbitMQ ────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: upraizo-rabbitmq
    restart: always
    hostname: upraizo-rmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-upraizo_mq}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST:-/}
      RABBITMQ_VM_MEMORY_HIGH_WATERMARK: "0.7"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq/
    # Management UI — SSH tunnel only (127.0.0.1)
    # Access: ssh -L 15672:127.0.0.1:15672 user@VM_IP
    ports:
      - "127.0.0.1:15672:15672"
    deploy:
      resources:
        limits:
          cpus: "0.40"
          memory: 1G
        reservations:
          cpus: "0.10"
          memory: 256M
    networks:
      - backend_internal
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Redis ───────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: upraizo-redis
    restart: always
    command: >
      redis-server
        --requirepass ${REDIS_PASSWORD}
        --maxmemory 180mb
        --maxmemory-policy allkeys-lru
        --appendonly yes
        --appendfsync everysec
        --tcp-keepalive 60
        --timeout 300
        --databases 4
    volumes:
      - redis_data:/data
    deploy:
      resources:
        limits:
          cpus: "0.20"
          memory: 512M
        reservations:
          cpus: "0.05"
          memory: 128M
    networks:
      - backend_internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# ── Volumes ───────────────────────────────────────────────────
volumes:
  rabbitmq_data:
    name: upraizo_rabbitmq_data
  redis_data:
    name: upraizo_redis_data
  server_tmp:
    name: upraizo_server_tmp
  nginx_logs:
    name: upraizo_nginx_logs

# ── Networks ──────────────────────────────────────────────────
networks:
  # Nginx ↔ Server (internet access for external APIs)
  backend_web:
    name: upraizo_backend_web
    driver: bridge

  # Server ↔ RMQ ↔ Redis (NO internet, fully isolated)
  backend_internal:
    name: upraizo_backend_internal
    driver: bridge
    internal: true

  # Server ↔ PgBouncer (cross-compose, created manually)
  upraizo_shared:
    name: upraizo_shared
    external: true
