services:
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: upraizo_rabbitmq
    restart: unless-stopped
    # By default, use env variables from .env to set up the default user and password
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST:-/}
    ports:
      # AMQP protocol port - exposed but should be firewalled in actual production
      - "5672:5672"
      # Management UI - binding to 127.0.0.1 ensures it's only accessible to localhost 
      # (use an SSH tunnel or reverse proxy like Nginx to access it securely in production)
      - "127.0.0.1:15672:15672"
    volumes:
      # Persistent storage for messages and state
      - rabbitmq_data:/var/lib/rabbitmq/
      # Optional: custom config if you need fine-grained control
      # - ./rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M

volumes:
  rabbitmq_data:
    name: upraizo_rabbitmq_data
