# ==============================================================
# Upraizo Nginx — Production Config
# ==============================================================
# Cloudflare Origin Certificate SSL
# Reverse proxy to Go server only
# ==============================================================

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    # ── Basic ─────────────────────────────────────────────────
    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   65;
    types_hash_max_size 2048;

    # Match server's REQUEST_BODY_LIMIT (1GB for video uploads)
    client_max_body_size 1024M;

    # ── Logging ───────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    # ── Gzip ──────────────────────────────────────────────────
    gzip            on;
    gzip_types      text/plain application/json application/javascript text/css;
    gzip_min_length 256;

    # ── Rate Limiting ─────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m rate=100r/s;

    # ── Upstream ──────────────────────────────────────────────
    upstream backend {
        server server:8080;
        keepalive 32;
    }

    # ── HTTP → HTTPS Redirect ─────────────────────────────────
    server {
        listen 80;
        server_name api.upraizo.com;
        return 301 https://$host$request_uri;
    }

    # ── HTTPS Server ──────────────────────────────────────────
    server {
        listen 443 ssl;
        http2 on;
        server_name api.upraizo.com;

        # Cloudflare Origin Certificate
        ssl_certificate     /etc/nginx/ssl/origin.pem;
        ssl_certificate_key /etc/nginx/ssl/origin-key.pem;

        # SSL Hardening
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # Security Headers
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Rate Limiting
        limit_req zone=api burst=50 nodelay;

        # ── Main Proxy ────────────────────────────────────────
        location / {
            proxy_pass http://backend;
            proxy_http_version 1.1;

            # Headers
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection        "";

            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout    30m;
            proxy_read_timeout    30m;

            # Buffering
            proxy_buffering  on;
            proxy_buffer_size 4k;
            proxy_buffers     8 4k;
        }

        # ── Health (no rate limit) ────────────────────────────
        location /health {
            proxy_pass http://backend;
            proxy_set_header Host $host;
        }
    }
}
